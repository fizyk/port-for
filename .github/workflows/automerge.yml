name: Merge me test dependencies!

on:
  workflow_run:
    types:
      - completed
    workflows:
      # List all required workflow names here.
      - 'Run linters'
      - 'Run tests'
      - 'Test build package'
      - 'Run test commands'

jobs:
  automerge:
    uses: fizyk/actions-reuse/.github/workflows/shared-automerge.yml@14e008c246b7b8eeab7cb5c543117471fee37310 # v5.1.2
    secrets:
      app_id: ${{ secrets.MERGE_APP_ID }}
      private_key: ${{ secrets.MERGE_APP_PRIVATE_KEY }}
