name: Run tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  tests:
    uses: fizyk/actions-reuse/.github/workflows/shared-tests-pytests.yml@9328bd2621a0322c2d7aeb80cd41f53a8771f4ee # v5.2.5
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13", "3.14", "3.15", "pypy3.11"]'
      dependency-manager: uv
  tests-macos:
    needs:
      - tests
    uses: fizyk/actions-reuse/.github/workflows/shared-tests-pytests.yml@9328bd2621a0322c2d7aeb80cd41f53a8771f4ee # v5.2.5
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13", "3.14", "3.15", "pypy3.11"]'
      dependency-manager: uv
      os: macos-latest
  tests-windows:
    needs:
      - tests
    uses: fizyk/actions-reuse/.github/workflows/shared-tests-pytests.yml@9328bd2621a0322c2d7aeb80cd41f53a8771f4ee # v5.2.5
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13", "3.14", "3.15", "pypy3.11"]'
      dependency-manager: uv
      os: windows-latest
      env: '{"PYTHONTRACEMALLOC": 20}'
